<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="view-transition" content="same-origin">
    <title>BOQ Auditor - KMZ EMR Standard</title>
    
    <link rel="stylesheet" href="../transitions.css">
    <link rel="icon" type="image/svg+xml" sizes="64x64" href="../kmz-emr-standard/assets/favicon.svg">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" defer></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
    
    <style>
        :root {
            --bg-body: #0d1117; --bg-panel: #161b22; --border: #30363d;        
            --primary: #58a6ff; --text-main: #c9d1d9; --text-muted: #8b949e;    
            --btn-green: #238636; --btn-green-hover: #2ea043;
            --radius: 6px;
        }
        
        /* Body dibikin full, padding dipindah ke content-wrapper */
        body { font-family: -apple-system, sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Header 100% konsisten sama Spatial Editor */
        header { background-color: var(--bg-panel); padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        
        /* Pembungkus isi webnya biar ga mentok pinggir */
        .content-wrapper { padding: 24px; display: flex; flex-direction: column; gap: 24px; overflow-y: auto; flex: 1; }

        .back-btn { color: var(--text-main); text-decoration: none; display: flex; align-items: center; gap: 8px; font-size: 14px; background: var(--bg-body); padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius); transition: background 0.2s;}
        .back-btn:hover { background: #21262d; }
        
        .card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; }
        .drop-zone { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; box-sizing: border-box; border: 2px dashed var(--border); 
            border-radius: var(--radius); padding: 3rem 2rem; text-align: center; 
            cursor: pointer; transition: 0.2s; background: var(--bg-body); 
        }
        .drop-zone:hover, .drop-zone.dragover { border-color: var(--primary); background: rgba(88, 166, 255, 0.05); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 13px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: var(--bg-body); color: var(--text-muted); }
        .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .bg-green { background: rgba(46, 160, 67, 0.15); color: #3fb950; }
        .bg-red { background: rgba(248, 81, 73, 0.15); color: #f85149; }
        
        /* --- ELEGANT BUTTON SYSTEM --- */
        .action-bar { display: flex; justify-content: flex-end; gap: 12px; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 8px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
        .btn svg { width: 16px; height: 16px; }
        
        .btn-primary { background: var(--btn-green); color: white; border-color: rgba(255,255,255,0.1); }
        .btn-primary:hover:not(:disabled) { background: var(--btn-green-hover); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-secondary { background: var(--bg-body); color: var(--text-main); border-color: var(--border); }
        .btn-secondary:hover { background: #21262d; border-color: #8b949e; }
        
        .btn-purple { background: #5a32a3; color: white; border-color: rgba(255,255,255,0.1); }
        .btn-purple:hover { background: #6c42bd; }
    </style>
</head>
<body>

    <header style="justify-content: center; position: relative;">
        <div style="flex: 1; display: flex; align-items: center;">
            <a href="../index.html" style="text-decoration: none; color: var(--text-muted); font-size: 14px; display: flex; align-items: center; gap: 8px; transition: color 0.2s;" onmouseover="this.style.color='var(--text-main)'" onmouseout="this.style.color='var(--text-muted)'">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Portfolio
            </a>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center; text-align: center;">
            <h1 style="margin: 0; font-size: 18px; white-space: nowrap;">BOQ Auditor</h1>
        </div>
        
        <div style="flex: 1; display: flex; justify-content: flex-end; gap: 10px;">
            <a href="../kmz-emr-standard/index.html" class="back-btn" style="text-decoration: none;">⬅️ Back to KMZ EMR</a>
        </div>
    </header>

    <div class="content-wrapper">
        <div class="card">
            <label class="drop-zone" id="dropZone">
                <div id="dropZoneContent">
                    <h3 style="margin: 0 0 10px 0; color: var(--primary);">Drag & Drop Multiple Files Here</h3>
                    <p style="margin: 0; color: var(--text-muted);">Select both .KMZ and .XLSX files. We will pair them automatically.</p>
                </div>
                
                <div id="dropZoneLoading" style="display: none; flex-direction: column; align-items: center;">
                    <span class="loading-spinner"></span>
                    <p style="margin-top:10px; color: var(--primary); font-weight: bold;">Reading & Pairing Files...</p>
                </div>

                <input type="file" id="fileInput" accept=".kmz,.kml,.xlsx,.xls" multiple style="display: none;">
            </label>
        </div>

        <div class="card" id="previewContainer" style="display: none;">
            <h3 style="margin-top: 0;">File Pairing Preview</h3>
            <div style="overflow-x: auto;">
                <table id="pairingTable">
                    <thead>
                        <tr>
                            <th>Site / Core Name</th>
                            <th>KMZ Design File</th>
                            <th>Excel BOQ File</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>

            <div id="actionButtons" class="action-bar">
                <button id="resetAuditBtn" class="btn btn-secondary">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    Clear List
                </button>
                
                <button id="runAuditBtn" class="btn btn-primary" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    Run Batch Audit
                </button>
                
                <button id="downloadPdfBtn" class="btn btn-purple" style="display: none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Download PDF Report
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="audit.js"></script>
</body>
</html>
